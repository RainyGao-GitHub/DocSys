<!DOCTYPE html>
<html style="height: 100%;">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0">
	<title>历史详情</title>
	<script type="text/javascript" src="lang/ch.js"></script>
	<link href="static/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link href="static/bootstrapQ/qiao.css" rel="stylesheet">
	<link href="static/font-awesome/css/font-awesome.min.css" rel="stylesheet">
	<link href="static/fonts/font.css" rel="stylesheet">
	<link href="static/styles/kancloud.css" rel="stylesheet">
	<link rel="stylesheet" href="static/freeTeam/css/resetV2.css" type="text/css" media="screen" />
	<link rel="stylesheet" href="static/freeTeam/css/boot-css/bootstrap.custom.css" type="text/css" media="screen" />
	<link rel="stylesheet" type="text/css" href="css/style.css">
	<script type="text/javascript">
		var gShareId;
	</script>
	<script src="static/artDialog/lib/jquery-1.10.2.js" type="text/javascript"></script>
	<script src="static/bootstrap/js/bootstrap.min.js" type="text/javascript"></script>
	<script src="static/bootstrapQ/qiao.js" type="text/javascript"></script>
	<script type="text/javascript" src="js/common.js"></script>
	<script type="text/javascript" src="js/base64.js"></script>
	<script type="text/javascript" src="js/DocSys.js"></script>
	<script type="text/javascript" src="js/DocHistoryDetail.js"></script>
	<style type="text/css">
		html, body {
			height: 100%;
			margin: 0;
			overflow: hidden;
		}
		.m-manual.manual-reader {
			background: #fff;
		}
		.m-manual.manual-reader .manual-right {
			position: relative;
			left: 0 !important;
			right: auto;
			top: 0 !important;
			bottom: auto;
			width: 100%;
			overflow: visible;
		}
		.m-manual.manual-reader .manual-article {
			max-width: none;
			padding: 0 16px;
		}
		.m-manual.manual-reader .article-body.editor-content {
			min-height: auto !important;
		}
	</style>
</head>

<body class="m-manual manual-reader">
	<div style="height:100%;overflow-y:auto">
		<div class="manual-right">
	    	<div class="manual-article">
	        	<div class="article-body editor-content" id="historyDetail" style="min-height: 650px">
	            	<div class="panel-body eventset-list">	
	            		<li class="eventset-tit" style="margin-top: 0px;">
							<i class="cell changeType w10">修改类型</i>
							<i class="cell changeContent w30">修改内容</i>
							<i class="cell operation w10">操作</i>						
					</li>
				</div>
	               	<div class="panel-body eventset-list" id="historyDetails">
		 				<!-- 列表区域-->
				</div>
			</div>
		</div>
	</div>
	<script type="text/javascript">
		function initHistoryDetailsForArtDialog()
		{
			var dialogId = getQueryString("dialogId");
			var artDialogInstance = null;
			if(window.top.artDialogList)
			{
				artDialogInstance = window.top.artDialogList[dialogId];
			}
			if(artDialogInstance == null && window.parent.artDialogList)
			{
				artDialogInstance = window.parent.artDialogList[dialogId];
			}

			if(artDialogInstance == null || artDialogInstance.config == null || artDialogInstance.config.data == null)
			{
				$("#historyDetails").html("<p>历史详情页面初始化失败</p>");
				return;
			}

			var historyDetailDialogData = artDialogInstance.config.data;
			gShareId = historyDetailDialogData.shareId;
			DocHistoryDetail.historyDetailsPageInit(historyDetailDialogData.commitId, historyDetailDialogData.vid, historyDetailDialogData.docId, historyDetailDialogData.parentPath, historyDetailDialogData.docName, historyDetailDialogData.historyType);
		}

		$(document).ready(function () {
			initHistoryDetailsForArtDialog();
		});
	</script>
</body>
</html>
