<style>
#printLoadingBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 200px;
    font-size: 16px;
    color: #555;
}
#printLoadingBox .print-spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #ddd;
    border-top-color: #337ab7;
    border-radius: 50%;
    animation: printSpin 0.8s linear infinite;
    margin-bottom: 16px;
}
@keyframes printSpin { to { transform: rotate(360deg); } }
#printLoadingBox .print-error-icon {
    font-size: 36px;
    color: #e74c3c;
    margin-bottom: 12px;
}
#printLoadingBox .print-error-msg {
    color: #e74c3c;
    font-size: 14px;
    max-width: 80%;
    text-align: center;
    word-break: break-all;
}
</style>

<div id="pdfPlayer" class="pdfPlayer" style="width: 100%; height:1200px;"></div>

<script type="text/javascript">
    function GetRequest() {
        var url = location.search;
        var theRequest = {};
        if (url.indexOf("?") !== -1) {
            var str = url.substr(1);
            var strs = str.split("&");
            for(var i = 0; i < strs.length; i ++) {
                theRequest[strs[i].split("=")[0]]=unescape(strs[i].split("=")[1]);
            }
        }
        return theRequest;
    }
    var params = GetRequest();
    var docid = params['docid'];
    //获取artDialog父窗口传递过来的参数
    var artDialog2 = window.top.artDialogList['ArtDialog'+docid];
    if (artDialog2 == null) {
        artDialog2 = window.parent.artDialogList['ArtDialog' + docid];
    }
    // 获取对话框传递过来的数据
    var docInfo = artDialog2.config.data;
	console.log("pdfViewerForArt.html => docInfo:",docInfo);

	var var_win_height = $(window).height();

    $(document).ready(function () {
        resetPlayerSize();
        viewDoc();
    });

    $(window).resize(function () {
        resetPlayerSize();
    });

    function resetPlayerSize() {
        var_win_height = $(window).height();
        $(".pdfPlayer").css({ "height": var_win_height + "px" });
    }

    function showLoading() {
        $('#pdfPlayer').html(
            '<div id="printLoadingBox">' +
                '<div class="print-spinner"></div>' +
                '<span>文档转换中，请稍候...</span>' +
            '</div>'
        );
    }

    function showPrintError(msg) {
        $('#pdfPlayer').html(
            '<div id="printLoadingBox">' +
                '<div class="print-error-icon">&#10006;</div>' +
                '<div class="print-error-msg">' + (msg || '获取文件失败') + '</div>' +
            '</div>'
        );
    }

   	function viewDoc()
   	{
	    var fileLink = docInfo.fileLink;
	    if(!fileLink || fileLink == null || fileLink == "")
	    {
	    	// 有 printList 说明是打印流程（可能需要后台转换），走打印专用通道
	    	if(docInfo.printList !== undefined && docInfo.printList !== null)
	    	{
	    		showLoading();
	    		getDocFileLinkForPrint(docInfo, function(link, dataEx) {
	    			if(dataEx == "pdfViewOnly")
	    			{
	    				// 无下载权限，切换为只读模式查看
	    				docInfo.fileLink = link;
	    				var viewerMode = "viewOnly";
	    				var src = buildPdfViewerSrc(link, viewerMode, 0, 0);
	    				$('#pdfPlayer').html('<iframe frameBorder="0" scrolling="no" src="' + src + '" style="width:100%; height:100%;"></iframe>');
	    			}
	    			else
	    			{
	    				showPDF(link);
	    			}
	    		}, function(errMsg) {
	    			showPrintError(errMsg);
	    		}, "REST");
	    	}
	    	else
	    	{
	    		getDocFileLinkForPreview(docInfo, showPDF, showErrorMessage, "REST");
	    	}
	    }
	    else
	    {
	    	showPDF(fileLink);
	    }
   	}

    function showPDF(url)
   	{
    	console.log("showPDF() url:", url);
        var src = buildPdfViewerSrc(url, null, null, null);
        $('.pdfPlayer').html('<iframe frameBorder="0" scrolling="no" src="' + src + '" style="width:100%; height:100%;"></iframe>');
   	}

    function buildPdfViewerSrc(url, viewerMode, showPrint, showDownload)
    {
        var src = 'static/pdfjs/web/viewer.html?file=' + url;

        // 优先使用传入参数，其次从 URL querystring 读取
        var vm = (viewerMode != null && viewerMode !== undefined) ? viewerMode : getQueryString('viewerMode');
        var sp = (showPrint != null && showPrint !== undefined) ? showPrint : getQueryString('showPrint');
        var sd = (showDownload != null && showDownload !== undefined) ? showDownload : getQueryString('showDownload');

        if(vm && vm != "")
        {
            src += '&viewerMode=' + encodeURIComponent(vm);
        }
        if(sp != undefined && sp != null && sp != "")
        {
            src += '&showPrint=' + encodeURIComponent(sp);
        }
        if(sd != undefined && sd != null && sd != "")
        {
            src += '&showDownload=' + encodeURIComponent(sd);
        }
        return src;
    }
</script>
