<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Manager Redirect</title>
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="expires" content="0">
  </head>
  <body>
    Redirecting...
  </body>
  <script language="javascript" type="text/javascript">
	function getBrowserLang()
	{
		var language = "ch";

		var userLanguage = getCookie("UserLanguage");
		if(userLanguage == undefined || userLanguage == "")
		{
			language = navigator.language;
			console.log("getBrowserLang() navigator.language:" + language);
		}
		else
		{
			language = userLanguage;
			console.log("getBrowserLang() userLanguage:" + language);
		}

		if(language == undefined)
		{
			return "ch";
		}

		switch(language.toLowerCase())
		{
		case "us":
		case "en":
		case "en_us":
			return "en";
		case "zh-tw":
		case "zh-hk":
		case "zh-cn":
			return "ch";
		default:
			break;
		}
		return "ch";
	}

	function getCookie(c_name)
	{
		if(document.cookie.length <= 0)
		{
			return "";
		}

		var c_start = document.cookie.indexOf(c_name + "=");
		if(c_start != -1)
		{
			c_start = c_start + c_name.length + 1;
			c_end = document.cookie.indexOf(";", c_start);
			if(c_end == -1)
			{
				c_end = document.cookie.length;
			}
			return unescape(document.cookie.substring(c_start, c_end));
		}
		return "";
	}

	function getLangExt(langType)
	{
		if(langType == undefined)
		{
			return "";
		}

		switch(langType)
		{
		case "en":
			return "_en";
		}
		return "";
	}

	var langType = getBrowserLang();
	var langExt = getLangExt(langType);
	window.location.href = '/DocSystem/manager/login' + langExt + '.html';
  </script>
</html>
